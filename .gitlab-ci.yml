pages:
  script:
    - mkdir -p public
    - echo '/* /redirect.html 200' > public/_redirects
    - echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Redirecting...</title><script>var fullPath=window.location.pathname+window.location.search+window.location.hash;window.location.replace("https://wiki.leukeen.cn"+fullPath);</script></head><body>Redirecting...</body></html>' > public/redirect.html
  artifacts:
    paths:
      - public
  only:
    - main
