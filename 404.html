<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>正在跳转...</title>
    <script>
        // 获取当前完整的路径、查询参数和哈希值
        var fullPath = window.location.pathname + window.location.search + window.location.hash;
        // 构建新域名的完整 URL
        var newUrl = 'https://wiki.leukeen.cn' + fullPath;
        // 执行重定向
        window.location.replace(newUrl);
    </script>
</head>
<body>
    <p>网站域名应为 <a href="https://wiki.leukeen.cn">wiki.leukeen.cn</a>，正在为您跳转...</p>
</body>
</html>
