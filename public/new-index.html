<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>页面跳转中...</title>
    <script>
        // 获取当前完整的路径和查询参数（例如：/某个页面?key=value）
        var fullPath = window.location.pathname + window.location.search + window.location.hash;
        // 构建新域名的完整URL
        var newUrl = 'https://wiki.leukeen.cn' + fullPath;
        // 执行重定向
        window.location.replace(newUrl);
    </script>
</head>
<body>
    <p>正在为您跳转到 <a href="https://wiki.leukeen.cn">wiki.leukeen.cn</a>...</p>
</body>
</html>
